version: '3.8'

services:
  db:
    image: postgres:15
    container_name: oliinyk_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shop_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: oliinyk_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata: